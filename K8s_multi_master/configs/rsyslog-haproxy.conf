# /etc/rsyslog.d/49-haproxy.conf
#
# Routes HAProxy's syslog output — sent via `log /dev/log local2 info` in
# haproxy.cfg — into its own dedicated file instead of mixing into the
# generic /var/log/syslog (or /var/log/messages on RHEL-family).
#
# The "49-" filename prefix makes rsyslog process this before its default
# catch-all rules (typically 50-default.conf), and "& stop" prevents the
# same lines from ALSO landing in the generic syslog file.
#
# Assumes nothing else on this host uses the local2 facility. If something
# else does, switch to filtering on programname instead:
#   if $programname == 'haproxy-k8s-api' then /var/log/haproxy-k8s-api.log

local2.*                                /var/log/haproxy-k8s-api.log
& stop
