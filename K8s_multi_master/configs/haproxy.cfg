#-----------------------------------------------------------------------------
# /etc/haproxy/haproxy.cfg
# Production-grade HAProxy config — Kubernetes API server (kube-apiserver) LB
#
# Deploy IDENTICALLY on every control-plane / dedicated LB node
# (Master1, Master2, Master3 ... no per-node edits required in this file).
#
# Backend server list must be kept in sync whenever a control-plane node is
# added or removed from the cluster.
#-----------------------------------------------------------------------------

global
    log /dev/log local2 info
    log-tag haproxy-k8s-api
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    user haproxy
    group haproxy
    daemon
    # Sizing basis (see ../../02-technical-implementation-guide.md Section 8 for the
    # full formula): nbthread ~= 50% of this node's vCPU count when HAProxy shares the
    # node with etcd/apiserver, leaving the rest for them. maxconn sized so that
    # maxconn x ~32KB stays under ~10-15% of node RAM. At 4 vCPU / 12GB (HIMS masters),
    # that's nbthread=2 and maxconn~20000 (~640MB worst case, ~5% of 12GB). On a
    # smaller box (e.g. a 2 vCPU / 2GB dev VM), scale both down — don't copy these
    # numbers onto different-sized hardware.
    maxconn 20000
    nbthread 2
    tune.ssl.default-dh-param 2048

defaults
    mode                    tcp
    log                     global
    option                  tcplog
    option                  dontlognull
    option                  redispatch
    retries                 3
    timeout connect         5s
    timeout client          1m
    timeout server          1m
    timeout check           5s
    timeout queue           30s
    maxconn                 20000

#-----------------------------------------------------------------------------
# Kubernetes API Server (control-plane) load balancing
#-----------------------------------------------------------------------------
frontend kubernetes-api
    bind *:6443
    mode tcp
    option tcplog
    default_backend kube-masters

backend kube-masters
    mode tcp
    balance roundrobin
    # TLS-handshake health check: proves kube-apiserver's TLS stack is actually
    # responsive, not just that the TCP port accepts a SYN. This catches a
    # hung/degraded apiserver that a plain TCP connect check would miss.
    # NOTE: "verify none" goes on default-server below, NOT on tcp-check connect
    # — HAProxy 2.4.x (Ubuntu 22.04's packaged version) doesn't accept "verify"
    # as a tcp-check connect keyword at all. But without verify none set
    # SOMEWHERE, HAProxy defaults SSL verification to "required" and refuses to
    # even start ("verify is enabled by default but no CA file specified") since
    # no CA is configured for this check to verify against.
    option tcp-check
    tcp-check connect ssl
    default-server inter 3s fastinter 1s downinter 5s fall 3 rise 2 verify none
    # HIMS production masters. Add/remove a line here whenever a control-plane
    # node is added/removed from the cluster.
    server mn01 10.200.50.129:6443 check    # HIMS-PRD-MN-01
    server mn02 10.200.50.130:6443 check    # HIMS-PRD-MN-02
    server mn03 <MN03_IP>:6443 check        # HIMS-PRD-MN-03 (new node — TBD, see ../../03-master-node-setup.md)

#-----------------------------------------------------------------------------
# Stats / monitoring endpoint
# Never expose this publicly. Bind only to localhost + an internal mgmt IP,
# and require authentication. Prometheus/monitoring should scrape via the
# mgmt-only bind or the /run/haproxy/admin.sock socket instead where possible.
#-----------------------------------------------------------------------------
userlist haproxy-admin
    # This is NOT a real hash — it's a placeholder shown only to illustrate the
    # expected $6$... crypt format. Generate your own before deploying:
    #   mkpasswd -m sha-512 'YourStrongPasswordHere'
    # then paste the full output (starts with $6$) in place of the line below.
    user admin password REPLACE_WITH_OUTPUT_OF_mkpasswd_DASH_m_sha-512

frontend stats
    bind 127.0.0.1:8404
    # bind <THIS_NODE_IP>:8404        # e.g. 10.200.50.129 on MN-01 — uncomment + set per-node only if remote scraping is needed
    mode http
    option httplog
    stats enable
    stats uri /haproxy?stats
    stats refresh 10s
    acl AUTH_OK http_auth(haproxy-admin)
    http-request auth realm haproxy-stats unless AUTH_OK
    stats admin if AUTH_OK
