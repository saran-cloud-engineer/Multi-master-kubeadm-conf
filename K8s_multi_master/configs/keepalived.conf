! /etc/keepalived/keepalived.conf
! Production-grade Keepalived config for the Kubernetes API VIP.
!
! SAME STRUCTURE on every master. Only 3 values differ per node (marked
! "PER-NODE" in a comment on the line above each one):
!   - router_id
!   - priority
!   - unicast_src_ip
!
! HIMS production values — see ../PRODUCTION-VALUES.md for the full table and
! what's still unconfirmed (MN-03's real IP and the interface name below are
! NOT yet verified against every real box):
!   VIP            : 10.200.40.143/24?  ⚠ GIVEN, BUT NOT YET APPLIED BELOW — this is on a
!                                          DIFFERENT subnet (.40) than every master's real IP
!                                          (10.200.50.129/.130, ens7's own subnet 10.200.50.0/24).
!                                          keepalived's virtual_ipaddress relies on gratuitous ARP
!                                          on the SAME LAN segment as the interface — a VIP on a
!                                          different subnet needs extra network-level routing/
!                                          proxy-ARP from your network team, plain VRRP alone won't
!                                          fail over correctly otherwise. CONFIRM this is really a
!                                          separate routed VIP subnet and not a typo for
!                                          10.200.50.143 before this value is applied anywhere.
!   MN-01 (this)   : 10.200.50.129      priority 200 (preferred VIP owner)
!   MN-02          : 10.200.50.130      priority 150
!   MN-03          : <MN03_IP>          priority 100 (new node — real IP TBD)
!   Interface      : ens7                Confirmed via `ip addr` on MN-02 (2026-07-20) — NOT eth0,
!                                          as expected for modern predictable interface naming.
!                                          MN-01/MN-03 not yet individually confirmed — likely the
!                                          same given identical provisioning, but verify each on
!                                          the actual box first:
!                                            ip -br addr
!                                          (ignore "lo" and any virtual docker0/cni0/veth* entries;
!                                          pick whichever interface is UP with that node's real IP)
!
! NOTE: the directives below still use placeholder values (eth0, <CP_VIP>) —
! deliberately left generic pending confirmation of the VIP subnet question
! above. Do not substitute real values into interface/virtual_ipaddress below
! until that's resolved.
!
! NOTE: comments are deliberately kept on their own line, never trailing
! after a directive on the same line. Some keepalived versions do not
! reliably strip inline trailing comments, which can produce confusing
! parse errors even when braces are correctly balanced.

global_defs {
    # PER-NODE: LVS_K8S_API_M1 / LVS_K8S_API_M2 / LVS_K8S_API_M3
    router_id LVS_K8S_API_M1
    # Required on keepalived >= 2.x to allow running scripts as root.
    enable_script_security
    script_user root
    vrrp_skip_check_adv_addr
    # vrrp_garp_interval / vrrp_gna_interval deliberately omitted, not set to 0 —
    # this keepalived version rejects a literal 0 ("number outside range
    # [0.000001, 4294.967295]"). Omitting them entirely gives the same
    # "no repeated announcements beyond the default burst" behavior that 0
    # was meant to express, without hitting that validation error.
    max_auto_priority
}

#-------------------------------------------------------------------------
# Health check: is HAProxy actually able to serve the API on this node?
#-------------------------------------------------------------------------
vrrp_script chk_haproxy {
    script "/etc/keepalived/chk_haproxy.sh"
    # Run every 2s, must return within 2s.
    interval 2
    timeout 2
    # NEGATIVE weight: priority drops by 20 when the script fails, which is
    # what actually triggers a failover. A positive weight would only boost
    # priority on success and do nothing useful on failure.
    weight -20
    # 2 consecutive failures before considered down, 2 consecutive passes
    # before considered healthy again.
    fall 2
    rise 2
}

vrrp_instance VI_KUBE_API {
    interface eth0    # ⚠ verify actual NIC name via `ip addr` on this real box first
    # Must be unique on this L2 segment / broadcast domain. 51 is this doc's
    # default — confirm with your network team that nothing else on
    # 10.200.50.0/24 already uses VRRP router_id 51 before deploying.
    virtual_router_id 51
    # PER-NODE: Master1=200, Master2=150, Master3=100 (highest = preferred owner)
    priority 200

    # state is BACKUP on ALL nodes, including the preferred master. This is
    # required for nopreempt to behave correctly: priority alone decides who
    # becomes MASTER, and nopreempt then stops needless VIP flapping once a
    # lower-priority node has taken over and the preferred master returns.
    state BACKUP
    nopreempt

    advert_int 1

    authentication {
        auth_type PASS
        # VRRP PASS auth truncates to 8 characters — this is a weak/legacy
        # check, not a real security boundary. The real boundary is
        # firewalling VRRP (protocol 112) to only the master/LB subnet.
        # SAME value on all nodes.
        auth_pass Ch4ngeMe
    }

    # Unicast VRRP — required on most cloud networks (AWS/Azure/GCP block
    # multicast/broadcast by default) and safer on shared L2 segments in
    # general. Delete this whole block only if you have verified multicast
    # is permitted on your network; keepalived then falls back to default
    # multicast VRRP (224.0.0.18) automatically.

    # PER-NODE: this node's own real IP. Shown here as MN-01; MN-02 uses
    # 10.200.50.130, MN-03 uses its own real IP once assigned (see
    # ../PRODUCTION-VALUES.md).
    unicast_src_ip 10.200.50.129
    unicast_peer {
        # The OTHER masters' real IPs (all but this node).
        10.200.50.130
        <MN03_IP>
    }

    virtual_ipaddress {
        <CP_VIP>/24 dev eth0 label eth0:vip
    }

    track_script {
        chk_haproxy
    }

    notify_master "/etc/keepalived/notify.sh MASTER"
    notify_backup "/etc/keepalived/notify.sh BACKUP"
    notify_fault  "/etc/keepalived/notify.sh FAULT"
    notify_stop   "/etc/keepalived/notify.sh STOP"
}
